name: Publish

on:
  push:
    tags: [v*]

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish to Marketplace
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Update changelog
        uses: thomaseizinger/keep-a-changelog-new-release@v2
        with:
          tag: ${{ github.ref_name }}

      - name: Extract release notes
        id: release-notes
        uses: ffurrer2/extract-release-notes@v3

      - name: Push changelog and version bump to main
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: release ${{ github.ref_name }}"
          file_pattern: "package.json CHANGELOG.md"
          branch: main
        
      - uses: lannonbr/vsce-action@4.0.0
        with:
          args: "publish ${GITHUB_REF_NAME#v} -p $VSCE_TOKEN"
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes '${{ steps.release-notes.outputs.release_notes }}'
